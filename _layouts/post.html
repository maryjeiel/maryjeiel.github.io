---
layout: default
---

<div class="post-page">
  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
  <article>
    <h1 class="post-page-title">{{ page.title }}</h1>
    <p class="post-page-date">{{ page.date | date: "%B %d, %Y" }}</p>
    <hr class="divider">
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
